<app-layout>
  <div class="agents-page">

    <!-- Header -->
    <div class="page-header">
      <div class="header-left">
        <h1>Agents</h1>
        <div class="seats-info">
          <span class="seats-badge">
            {{ agents.length }} agents
          </span>
        </div>
      </div>
      <div class="header-right">
        <div class="search-wrap">
          <span>🔍</span>
          <input class="search-input"
            [(ngModel)]="searchQuery"
            (ngModelChange)="filterAgents()"
            placeholder="Search agents..."/>
        </div>
        <button class="export-btn"
          (click)="exportCsv()">
          Export
        </button>
        <button class="new-btn"
          (click)="router.navigate(['/agents/invite'])"
          *ngIf="isAdmin">
          New agent
        </button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="agent-tabs">
      <button class="a-tab"
        [class.active]="activeTab === 'active'"
        (click)="activeTab = 'active';
          filterAgents()">
        Support Agents
        <span class="tab-count">
          {{ getActiveCount() }}
        </span>
      </button>
      <button class="a-tab"
        [class.active]="activeTab === 'inactive'"
        (click)="activeTab = 'inactive';
          filterAgents()">
        Deactivated Agents
        <span class="tab-count inactive">
          {{ getInactiveCount() }}
        </span>
      </button>
    </div>

    <!-- Table -->
    <div class="agents-table-wrap">
      <table class="agents-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Roles</th>
            <th>Groups</th>
            <th>Last Seen</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let a of filteredAgents"
            class="agent-row">
            <td>
              <div class="agent-name-cell">
                <div class="ag-av"
                  [style.background]="a.photoUrl
                    ? 'transparent'
                    : getAvatarColor(a.fullName)"
                  style="overflow:hidden">
                  <img *ngIf="a.photoUrl"
                    [src]="'https://localhost:7071'
                      + a.photoUrl"
                    style="width:100%;height:100%;
                      object-fit:cover;
                      border-radius:50%"/>
                  <span *ngIf="!a.photoUrl">
                    {{ a.fullName
                      ?.charAt(0)?.toUpperCase() }}
                  </span>
                </div>
                <div class="ag-info">
                  <span class="ag-name">
                    {{ a.fullName }}
                  </span>
                  <span class="ag-email">
                    {{ a.email }}
                  </span>
                </div>
              </div>
            </td>
            <td>
              <span class="role-badge"
                [class]="'role-' +
                  a.role?.toLowerCase()">
                {{ getRoleLabel(a.role) }}
              </span>
            </td>
            <td>
              <span class="group-text">
                {{ a.groupName || '—' }}
              </span>
            </td>
            <td>
              <span class="lastseen">
                {{ a.lastLoginAt
                  ? getTimeAgo(a.lastLoginAt)
                  : 'Never' }}
              </span>
            </td>
            <td>
              <div class="action-btns">
                <!-- Edit button — all admins -->
                <button class="edit-btn"
                  (click)="editAgent(a)"
                  *ngIf="isAdmin">
                  Edit
                </button>

                <!-- ✅ Delete ONLY for CompanyAdmin -->
                <button class="del-btn"
                  *ngIf="isCompanyAdmin"
                  (click)="deleteAgent(a)">
                  Delete
                </button>

                <!-- Deactivate/Activate -->
                <button class="deact-btn"
                  *ngIf="isAdmin"
                  (click)="toggleActive(a)">
                  {{ a.isActive
                    ? 'Deactivate' : 'Activate' }}
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</app-layout>
