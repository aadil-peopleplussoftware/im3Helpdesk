<app-layout>
  <div class="kb-page">

    <div class="page-top">
      <div>
        <h1>Knowledge Base</h1>
        <p>Help articles for your team and customers</p>
      </div>
      <button class="add-btn"
        *ngIf="canManage()"
        (click)="router.navigate(['/kb/create'])">
        + New Article
      </button>
    </div>

    <!-- Filters -->
    <div class="filter-row">
      <form [formGroup]="filterForm">
        <div class="filter-inputs">
          <div class="search-wrap">
            <span>🔍</span>
            <input class="search-input"
              formControlName="search"
              placeholder="Search articles..."/>
          </div>

          <select class="cat-select"
            formControlName="category">
            <option value="">All Categories</option>
            <option *ngFor="let c of categories"
              [value]="c">{{ c }}</option>
          </select>
        </div>
      </form>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="loading-center">
      <div class="spinner"></div>
    </div>

    <!-- Empty -->
    <div *ngIf="!loading && articles.length === 0"
      class="empty-state">
      <div class="empty-icon">📚</div>
      <h3>No articles found</h3>
      <button class="add-btn"
        *ngIf="canManage()"
        (click)="router.navigate(['/kb/create'])">
        Create First Article
      </button>
    </div>

    <!-- Articles Grid -->
    <div class="articles-grid"
      *ngIf="!loading && articles.length > 0">

      <div class="article-card"
        *ngFor="let a of articles"
        (click)="router.navigate(['/kb', a.id])">

        <div class="card-top">
          <span class="cat-badge">
            {{ a.category }}
          </span>
          <span class="draft-badge"
            *ngIf="!a.isPublished">
            Draft
          </span>
        </div>

        <h3 class="card-title">{{ a.title }}</h3>

        <p class="card-preview">
          {{ a.contentPreview }}
        </p>

        <div class="card-tags"
          *ngIf="a.tags">
          <span class="tag-pill"
            *ngFor="let tag of
              a.tags?.split(',')?.slice(0,3)">
            {{ tag.trim() }}
          </span>
        </div>

        <div class="card-footer">
          <span class="views-count">
            👁 {{ a.viewCount || 0 }} views
          </span>
          <span class="card-date">
            {{ a.createdAt | date:'dd MMM yyyy' }}
          </span>
        </div>

        <div class="card-actions"
          *ngIf="canManage()"
          (click)="$event.stopPropagation()">
          <button class="edit-btn"
            (click)="router.navigate(
              ['/kb/edit', a.id])">
            Edit
          </button>
          <button class="del-btn"
            (click)="deleteArticle(a.id)">
            Delete
          </button>
        </div>

      </div>
    </div>

  </div>
</app-layout>
