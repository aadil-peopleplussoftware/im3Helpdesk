
      <h2 style='margin:0 0 6px;font-size:20px;
        color:#1f2937;font-weight:700'>
        {{type_icon}} You've been invited
      </h2>
      <p style='color:#6b7280;font-size:14px;margin:0 0 24px'>
        <strong>{{organizer_name}}</strong> has added you to an event
        in <strong>{{org_name}}</strong>
      </p>
 
      <table width='100%' cellpadding='0' cellspacing='0'
        style='background:#f8fafc;border-radius:10px;
          border-left:4px solid #2563eb;
          padding:20px;margin-bottom:24px'>
        <tr>
          <td style='padding:8px 0'>
            <div style='font-size:18px;font-weight:700;
              color:#1f2937;margin-bottom:4px'>
              {{type_icon}} {{event_title}}
            </div>
            <div style='font-size:13px;color:#6b7280'>
              {{event_type_upper}}
            </div>
          </td>
        </tr>
        <tr>
          <td style='padding:8px 0;
            border-top:1px solid #e5e7eb'>
            <div style='font-size:14px;color:#374151'>
              📅 <strong>{{date_str}}</strong>
            </div>
            <div style='font-size:14px;color:#374151;margin-top:2px'>
              🕐 {{time_str}}{{end_str}}
            </div>
          </td>
        </tr>
        {{description_row}}
      </table>
 
      <p style='color:#6b7280;font-size:13px;text-align:center;margin:0'>
        Hi {{attendee_name}}, this invite was sent by
        <strong>{{organizer_name}}</strong> via {{org_name}}.
      </p>
