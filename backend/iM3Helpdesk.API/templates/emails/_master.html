<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'/>
  <meta name='viewport'
    content='width=device-width,initial-scale=1.0'/>
  <title>DeskMate</title>
</head>
<body style='margin:0;padding:0;
  background-color:#f3f4f6;
  font-family:Arial,-apple-system,
    BlinkMacSystemFont,sans-serif'>
 
  <table width='100%' cellpadding='0'
    cellspacing='0' border='0'
    style='background:#f3f4f6;padding:30px 0'>
    <tr>
      <td align='center'>
        <table width='600' cellpadding='0'
          cellspacing='0' border='0'
          style='max-width:600px;width:100%'>
 
          <!-- Header -->
          <tr>
            <td style='background:linear-gradient(
                135deg,#1d4ed8,#2563eb);
              border-radius:12px 12px 0 0;
              padding:24px 32px'>
              <table width='100%' cellpadding='0'
                cellspacing='0' border='0'>
                <tr>
                  <td>
                    <span style='color:white;
                      font-size:20px;font-weight:700;
                      letter-spacing:-0.5px'>
                      ⚡ DeskMate
                    </span>
                  </td>
                  <td align='right'>
                    <span style='color:#93c5fd;
                      font-size:12px'>
                      Support System
                    </span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
 
          <!-- Body -->
          <tr>
            <td style='background:white;
              padding:32px;
              border-left:1px solid #e5e7eb;
              border-right:1px solid #e5e7eb'>
              {{content}}
            </td>
          </tr>
 
          <!-- Footer -->
          <tr>
            <td style='background:#f9fafb;
              border:1px solid #e5e7eb;
              border-top:none;
              border-radius:0 0 12px 12px;
              padding:16px 32px;text-align:center'>
              <p style='margin:0;font-size:11px;
                color:#9ca3af;line-height:1.6'>
                This email was sent by
                <strong>{{org_name}}</strong>
                via DeskMate.<br/>
                Please do not reply directly unless
                responding to a ticket.
              </p>
              <p style='margin:8px 0 0;font-size:11px;
                color:#d1d5db'>
                Powered by
                <strong style='color:#2563eb'>
                  DeskMate
                </strong>
              </p>
            </td>
          </tr>
 
        </table>
      </td>
    </tr>
  </table>
 
</body>
</html>
