
<h2 style='color:#1a1f36;font-size:20px;margin:0 0 6px'>
  🎧 New Ticket Assigned
</h2>
<p style='color:#6b7280;font-size:14px;margin:0 0 24px'>
  Hi <strong>{{agent_name}}</strong>,
  a ticket has been assigned to you.
</p>
 
<div style='background:#f9fafb;border:1px solid #e5e7eb;
  border-radius:12px;padding:20px 24px;margin-bottom:24px'>
  <div style='display:flex;align-items:flex-start;
    justify-content:space-between;margin-bottom:16px'>
    <div>
      <div style='font-size:12px;color:#9ca3af;
        margin-bottom:4px'>TICKET NUMBER</div>
      <div style='font-size:22px;font-weight:700;
        color:#2563eb'>{{ticket_number}}</div>
    </div>
    <div style='background:{{priority_color}}20;
      color:{{priority_color}};padding:4px 14px;
      border-radius:20px;font-size:12px;font-weight:600'>
      {{priority}}
    </div>
  </div>
  <div style='border-top:1px solid #e5e7eb;
    padding-top:16px;display:flex;
    flex-direction:column;gap:8px'>
    <div>
      <span style='font-size:12px;color:#9ca3af'>
        Subject:
      </span>
      <span style='font-size:13px;font-weight:600;
        color:#1a1f36'>{{ticket_title}}</span>
    </div>
    <div>
      <span style='font-size:12px;color:#9ca3af'>
        Customer:
      </span>
      <span style='font-size:13px;color:#374151'>
        {{customer_name}}
      </span>
    </div>
  </div>
</div>
 
<div style='background:#fef3c7;border:1px solid #fde68a;
  border-radius:8px;padding:14px 16px;
  font-size:13px;color:#b45309;margin-bottom:16px'>
  ⚡ Please review and respond to this ticket
  at your earliest convenience.
</div>
 
<p style='font-size:12px;color:#9ca3af;
  text-align:center;margin:0'>
  {{org_name}} Helpdesk System
</p>
