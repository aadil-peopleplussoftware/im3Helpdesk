<div class="onboarding-shell">
  <section class="setup-panel">
    <header class="setup-header">
      <div class="brand-mark">iM3</div>
      <div>
        <h1>Set up your helpdesk</h1>
        <p>Connect the support mailbox that will create tickets for this organization.</p>
      </div>
    </header>

    <div class="steps">
      <button type="button" class="step-pill" [class.active]="currentStep === 1">
        <span>1</span>
        Organization
      </button>
      <button type="button" class="step-pill" [class.active]="currentStep === 2">
        <span>2</span>
        Mailbox
      </button>
    </div>

    <form
      *ngIf="currentStep === 1"
      [formGroup]="step1Form"
      (ngSubmit)="goToMailStep()"
      class="step-form">
      <div class="form-grid">
        <div class="logo-block">
          <div class="logo-preview">
            <img *ngIf="logoPreview" [src]="logoPreview" alt="Organization logo"/>
            <span *ngIf="!logoPreview">HQ</span>
          </div>
          <label class="upload-action">
            Upload logo
            <input type="file" hidden accept="image/*" (change)="onLogoSelect($event)"/>
          </label>
        </div>

        <label class="field">
          <span>Company name</span>
          <input type="text" formControlName="companyName" placeholder="Acme Support"/>
        </label>

        <label class="field">
          <span>Support email</span>
          <input type="email" formControlName="supportEmail" placeholder="support@company.com"/>
          <small>Incoming emails to this address will become support tickets.</small>
        </label>

        <label class="field color-field">
          <span>Brand color</span>
          <input type="color" formControlName="brandColor"/>
          <strong [style.background]="step1Form.value.brandColor"></strong>
        </label>
      </div>

      <footer class="actions">
        <button type="submit" class="primary-action" [disabled]="step1Form.invalid">
          Next
        </button>
      </footer>
    </form>

    <form
      *ngIf="currentStep === 2"
      [formGroup]="step2Form"
      (ngSubmit)="finish()"
      class="step-form">
      <div class="mail-grid">
        <label class="field">
          <span>SMTP host</span>
          <input type="text" formControlName="smtpHost" placeholder="smtp.gmail.com"/>
        </label>

        <label class="field compact">
          <span>SMTP port</span>
          <input type="number" formControlName="smtpPort" min="1"/>
        </label>

        <label class="field">
          <span>From email</span>
          <input type="email" formControlName="smtpFromEmail"/>
        </label>

        <label class="field">
          <span>From name</span>
          <input type="text" formControlName="smtpFromName" placeholder="Acme Support"/>
        </label>

        <label class="field">
          <span>Mailbox username</span>
          <input type="email" formControlName="smtpUsername"/>
        </label>

        <label class="field">
          <span>App password</span>
          <input type="password" formControlName="smtpPassword" autocomplete="new-password"/>
        </label>

        <label class="field">
          <span>IMAP host</span>
          <input type="text" formControlName="imapHost" placeholder="imap.gmail.com"/>
        </label>

        <label class="field compact">
          <span>IMAP port</span>
          <input type="number" formControlName="imapPort" min="1"/>
        </label>
      </div>

      <label class="toggle-row">
        <input type="checkbox" formControlName="emailPollingEnabled"/>
        <span>Enable email-to-ticket polling for this organization</span>
      </label>

      <footer class="actions split">
        <button type="button" class="secondary-action" (click)="currentStep = 1">
          Back
        </button>
        <button type="submit" class="primary-action" [disabled]="step2Form.invalid || loading">
          {{ loading ? 'Saving...' : 'Done' }}
        </button>
      </footer>
    </form>
  </section>
</div>
