<app-layout>
  <div class="create-page">

    <div class="page-header">
      <button class="back-btn"
        (click)="router.navigate(['/tickets'])">
        ← Back to Tickets
      </button>
      <h1>Create New Ticket</h1>
    </div>

    <div class="create-layout">

      <!-- Left: Main Form -->
      <div class="main-form">
        <div class="form-card">

          <!-- Template Selector -->
          <div class="template-row" *ngIf="templates.length > 0">
            <label>Use Template</label>
            <select class="form-select"
              [(ngModel)]="selectedTemplateId"
              [ngModelOptions]="{standalone: true}"
              (change)="applyTemplate(selectedTemplateId)">
              <option value="">-- No Template --</option>
              <option *ngFor="let t of templates" [value]="t.id">
                {{ t.name }}
              </option>
            </select>
          </div>

          <form [formGroup]="form" (ngSubmit)="onSubmit()">

            <!-- Subject -->
            <div class="form-group">
              <label>Subject <span class="req">*</span></label>
              <input type="text" formControlName="title"
                placeholder="Brief description of the issue..."
                [class.invalid]="form.get('title')?.invalid
                  && form.get('title')?.touched"/>
              <span class="error"
              *ngIf="form.get('title')?.invalid
                  && form.get('title')?.touched">
                Subject is required
              </span>
            </div>

            <!-- Description -->
            <div class="form-group">
              <label>Description <span class="req">*</span></label>
            <div class="rich-editor">
                <div class="editor-toolbar">
                  <button type="button" class="tb-btn"
                    (click)="docExec('bold')">
                    <strong>B</strong>
                  </button>
                  <button type="button" class="tb-btn"
                    (click)="docExec('italic')">
                    <em>I</em>
                  </button>
                  <button type="button" class="tb-btn"
                    (click)="docExec('underline')">
                    <u>U</u>
                  </button>
                  <span class="tb-sep"></span>
                  <button type="button" class="tb-btn"
                    (click)="docExec('insertUnorderedList')">≡</button>
                  <button type="button" class="tb-btn"
                    (click)="docExec('insertOrderedList')">1.</button>
                  <span class="tb-sep"></span>
                  <label class="tb-btn" title="Attach">
                    📎
               <input type="file" multiple hidden
                (change)="onFileSelect($event)"/>
                  </label>
                  <label class="tb-btn" title="Image">
                    🖼
                    <input type="file" multiple hidden
                      (change)="onFileSelect($event)"
                      accept="image/*"/>
                  </label>
                </div>
                <div class="editor-body"
                  contenteditable="true"
                  #descEditor
                  (input)="onDescInput($event)"
                  data-placeholder="Describe the issue in detail...">
                </div>
              </div>
            </div>

            <!-- Attachments Preview -->
            <div class="attachments-preview"
              *ngIf="pendingFiles.length > 0">
              <div class="pending-file"
                *ngFor="let f of pendingFiles; let i = index">
                <span class="file-icon">
                  {{ getFileIcon(f.type) }}
                </span>
                <span class="file-name">{{ f.name }}</span>
                <span class="file-size">
                  {{ formatFileSize(f.size) }}
                </span>
                <button type="button" class="remove-file"
                  (click)="removePendingFile(i)">×</button>
              </div>
            </div>

          </form>
        </div>
      </div>

      <!-- Right: Properties -->
      <div class="props-panel">
        <div class="props-card">
          <h3>Ticket Details</h3>

          <form [formGroup]="form" (ngSubmit)="onSubmit()">

            <div class="prop-field">
              <label>Type</label>
              <select class="form-select" formControlName="ticketType">
                <option *ngFor="let t of ticketTypes" [value]="t.value">
                  {{ t.label }}
                </option>
              </select>
            </div>

            <div class="prop-field">
              <label>Status</label>
              <select class="form-select" formControlName="status">
                <option *ngFor="let s of statuses" [value]="s.value">
                  {{ s.label }}
                </option>
              </select>
            </div>

            <div class="prop-field">
              <label>Priority</label>
              <select class="form-select" formControlName="priority">
                <option *ngFor="let p of priorities" [value]="p.value">
                  {{ p.label }}
                </option>
              </select>
            </div>

            <div class="prop-field">
              <label>Category</label>
              <select class="form-select" formControlName="category">
                <option *ngFor="let c of categories" [value]="c">
                  {{ c }}
                </option>
              </select>
            </div>

            <div class="prop-field">
              <label>Group</label>
              <select class="form-select" formControlName="agentGroupId">
                <option value="">No Group</option>
                <option *ngFor="let g of groups" [value]="g.id">
                  {{ g.name }}
                </option>
              </select>
            </div>

            <div class="prop-field">
              <label>Agent</label>
              <select class="form-select"
                formControlName="assignedToUserId">
                <option value="">Unassigned</option>
                <option *ngFor="let a of agents" [value]="a.id">
                  {{ a.fullName }}
                </option>
              </select>
            </div>

            <!-- Tags -->
            <div class="prop-field">
              <label>Tags</label>
              <div class="tags-input">
                <div class="tags-display" *ngIf="tags.length > 0">
                  <span class="tag-chip"
                    *ngFor="let tag of tags">
                    {{ tag }}
                    <button type="button"
                      (click)="removeTag(tag)">×</button>
                  </span>
                </div>
                <div class="tag-add">
                  <input [(ngModel)]="tagInput"
                    [ngModelOptions]="{standalone: true}"
                    placeholder="Add tag..."
                    (keyup.enter)="addTag()"/>
                  <button type="button"
                    (click)="addTag()">Add</button>
                </div>
              </div>
            </div>

            <!-- Custom Fields -->
            <div *ngIf="customFields.length > 0">
              <div class="cf-divider"></div>
              <div class="prop-field" *ngFor="let f of customFields">
                <label>
                  {{ f.label }}
                  <span class="req" *ngIf="f.isRequired">*</span>
                </label>
                <input *ngIf="f.fieldType === 'text'"
                  type="text"
                  [(ngModel)]="customFieldValues[f.id]"
                  [ngModelOptions]="{standalone: true}"
                  class="form-select"
                  [placeholder]="f.label"/>
                <input *ngIf="f.fieldType === 'number'"
                  type="number"
                  [(ngModel)]="customFieldValues[f.id]"
                  [ngModelOptions]="{standalone: true}"
                  class="form-select"/>
                <input *ngIf="f.fieldType === 'date'"
                  type="date"
                  [(ngModel)]="customFieldValues[f.id]"
                  [ngModelOptions]="{standalone: true}"
                  class="form-select"/>
                <textarea *ngIf="f.fieldType === 'textarea'"
                  [(ngModel)]="customFieldValues[f.id]"
                  [ngModelOptions]="{standalone: true}"
                  class="form-select"
                  rows="3">
                </textarea>
                <select *ngIf="f.fieldType === 'dropdown'"
                  [(ngModel)]="customFieldValues[f.id]"
                  [ngModelOptions]="{standalone: true}"
                  class="form-select">
                  <option value="">Select...</option>
                  <option *ngFor="let opt of f.options?.split(',')"
                    [value]="opt.trim()">
                    {{ opt.trim() }}
                  </option>
                </select>
                <label *ngIf="f.fieldType === 'checkbox'"
                  class="check-label">
                  <input type="checkbox"
                    [(ngModel)]="customFieldValues[f.id]"
                    [ngModelOptions]="{standalone: true}"/>
                  {{ f.label }}
                </label>
              </div>
            </div>

            <div class="form-actions">
              <button type="button" class="cancel-btn"
                (click)="router.navigate(['/tickets'])">
                Cancel
              </button>
              <button type="submit" class="submit-btn"
                [disabled]="loading">
                <span *ngIf="loading">Creating...</span>
                <span *ngIf="!loading">Create Ticket</span>
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</app-layout>
