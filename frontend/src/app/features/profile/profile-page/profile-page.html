<app-layout>
  <div class="profile-page">

    <div class="profile-header">
      <h1>My Profile</h1>
      <p>Manage your account settings</p>
    </div>

    <div class="profile-grid">

      <!-- Left: Photo + Basic -->
      <div class="profile-left">

        <!-- Photo Card -->
        <div class="profile-card photo-card">
          <div class="photo-wrap">
            <div class="photo-circle">
              <img *ngIf="photoUrl || photoPreview"
                [src]="photoPreview || photoUrl"
                alt="Profile photo"/>
              <div *ngIf="!photoUrl && !photoPreview"
                class="photo-initials"
                [style.background]="getAvatarColor(
                  profileForm.value.fullName)">
                {{ profileForm.value.fullName
                  ?.charAt(0)?.toUpperCase() || '?' }}
              </div>
            </div>

            <label class="photo-upload-btn">
              📷 Change Photo
              <input type="file" hidden
                accept="image/*"
                (change)="onPhotoSelect($event)"/>
            </label>
            <p class="photo-hint">JPG/PNG, max 5MB</p>
          </div>

          <div class="profile-name">
            {{ profileForm.value.fullName }}
          </div>
          <div class="profile-email">
            {{ profileForm.value.email }}
          </div>
        </div>

      </div>

      <!-- Right: Forms -->
      <div class="profile-right">

        <!-- Personal Info -->
        <div class="profile-card">
          <h3>Personal Information</h3>

          <form [formGroup]="profileForm" (ngSubmit)="saveProfile()">
            <div class="form-row">
              <div class="form-group">
                <label>Full Name <span class="req">*</span></label>
                <input type="text" formControlName="fullName"
                  placeholder="Your full name"/>
              </div>
              <div class="form-group">
                <label>Email <span class="req">*</span></label>
                <input type="email" formControlName="email"
                  placeholder="your@email.com"/>
              </div>
            </div>

            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" formControlName="phoneNumber"
                placeholder="+91 9999999999"/>
            </div>

            <div class="card-footer">
              <button type="submit" class="save-btn"
                [disabled]="savingProfile">
                {{ savingProfile ? 'Saving...' : 'Save Profile' }}
              </button>
            </div>
          </form>
        </div>

        <!-- Change Password -->
        <div class="profile-card">
          <h3>Change Password</h3>

          <form [formGroup]="passwordForm" (ngSubmit)="savePassword()">
            <div class="form-group">
              <label>Current Password</label>
              <input type="password"
                formControlName="currentPassword"
                placeholder="••••••••"/>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>New Password</label>
                <input type="password"
                  formControlName="newPassword"
                  placeholder="••••••••"/>
              </div>
              <div class="form-group">
                <label>Confirm Password</label>
                <input type="password"
                  formControlName="confirmPassword"
                  placeholder="••••••••"/>
              </div>
            </div>

            <div class="card-footer">
              <button type="submit" class="save-btn"
                [disabled]="savingPassword">
                {{ savingPassword ? 'Changing...' : 'Change Password' }}
              </button>
            </div>
          </form>
        </div>

        <!-- Organization (Admin only) -->
        <div class="profile-card">
          <h3>Organization Settings</h3>

          <form [formGroup]="orgForm" (ngSubmit)="saveOrg()">
            <div class="form-row">
              <div class="form-group">
                <label>Company Name</label>
                <input type="text" formControlName="name"
                  placeholder="Company name"/>
              </div>
              <div class="form-group">
                <label>Support Email</label>
                <input type="email" formControlName="supportEmail"
                  placeholder="support@company.com"/>
              </div>
            </div>

            <div class="form-group">
              <label>Brand Color</label>
              <div class="color-row">
                <input type="color"
                  formControlName="brandColor"
                  class="color-picker"/>
                <span class="color-val">
                  {{ orgForm.value.brandColor }}
                </span>
                <div class="color-preview"
                  [style.background]="orgForm.value.brandColor">
                </div>
              </div>
            </div>

            <div class="card-footer">
              <button type="submit" class="save-btn"
                [disabled]="savingOrg">
                {{ savingOrg ? 'Saving...' : 'Save Organization' }}
              </button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </div>
</app-layout>
