<app-layout>
  <div class="agents-page">

    <!-- Header -->
    <div class="page-header">
      <div class="header-left">
        <h1>Users</h1>
        <div class="seats-info">
          <span class="seats-badge">
            {{ agents.length }} Users
          </span>
        </div>
      </div>
      <div class="header-right">
        <div class="search-wrap">
          <span>🔍</span>
          <input class="search-input"
            [(ngModel)]="searchQuery"
            (ngModelChange)="filterAgents()"
            placeholder="Search Users..."/>
        </div>
        <button class="export-btn"
          *hasPermission="'agents:export'"
          (click)="exportCsv()">
          Export
        </button>
        <ng-container *hasPermission="'agents:add'">
          <button class="new-btn"
            *ngIf="isCompanyAdmin"
            (click)="router.navigate(['/agents/invite'])">
            New agent
          </button>
        </ng-container>
      </div>
    </div>

    <!-- Tabs -->
    <div class="agent-tabs">
      <button class="a-tab"
        [class.active]="activeTab === 'active'"
        (click)="activeTab = 'active'; filterAgents()">
        Support Agents
        <span class="tab-count">
          {{ getActiveCount() }}
        </span>
      </button>
      <button class="a-tab"
        [class.active]="activeTab === 'inactive'"
        (click)="activeTab = 'inactive'; filterAgents()">
        Deactivated Agents
        <span class="tab-count inactive">
          {{ getInactiveCount() }}
        </span>
      </button>
    </div>

    <!-- Table -->
    <div class="agents-table-wrap">
      <table class="agents-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Roles</th>
            <th>Groups</th>
            <th>Last Seen</th>
            <!-- ✅ Actions column sirf CompanyAdmin ke liye -->
            <th *ngIf="isCompanyAdmin">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let a of filteredAgents"
            class="agent-row">
            <td>
              <div class="agent-name-cell">
                <div class="ag-av"
                  [style.background]="a.photoUrl
                    ? 'transparent'
                    : getAvatarColor(a.fullName)"
                  style="overflow:hidden">
                  <img *ngIf="a.photoUrl"
                    [src]="baseUrl + a.photoUrl"
                    style="width:100%;height:100%;
                      object-fit:cover;border-radius:50%"/>
                  <span *ngIf="!a.photoUrl">
                    {{ a.fullName?.charAt(0)?.toUpperCase() }}
                  </span>
                </div>
                <div class="ag-info">
                  <span class="ag-name">{{ a.fullName }}</span>
                  <span class="ag-email">{{ a.email }}</span>
                </div>
              </div>
            </td>
            <td>
              <span class="role-badge"
                [class]="'role-' + a.role?.toLowerCase()">
                {{ getRoleLabel(a.role) }}
              </span>
            </td>
            <td>
              <!-- ✅ Groups badges — groupName empty ho toh — -->
              <div class="group-badges"
                *ngIf="a.groupName">
                <span class="group-badge"
                  *ngFor="let gn of a.groupName.split(', ')">
                  {{ gn }}
                </span>
              </div>
              <span class="group-dash"
                *ngIf="!a.groupName">—</span>
            </td>
            <td>
              <span class="lastseen">
                {{ a.lastLoginAt
                  ? getTimeAgo(a.lastLoginAt)
                  : 'Never' }}
              </span>
            </td>
            <!-- ✅ Sirf CompanyAdmin ko Activate/Deactivate button -->
            <td *ngIf="isCompanyAdmin">
              <button class="deact-btn"
                [class.activate-btn]="!a.isActive"
                (click)="toggleActive(a)">
                {{ a.isActive ? 'Deactivate' : 'Activate' }}
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</app-layout>
